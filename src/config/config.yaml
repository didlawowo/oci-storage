server:
  port: 3030

storage:
  path: "data"

backup:
  enabled: false
  provider: "gcp" # "aws" ou "gcp"
  gcp:
    bucket: "oci-storage-backup"
    projectID: "dc-consulting-home"
  # aws:
  #   bucket: "oci-storage-backup"
  #   region: "eu-west-1"

auth:
  enabled: false # set to false to disable auth on /v2/ (or env AUTH_ENABLED=false)

logging:
  level: "debug"
  format: "text"

# Docker registry proxy/cache configuration
proxy:
  enabled: true
  cache:
    maxSizeGB: 10
  timeout:
    blobBaseSeconds: 60 # Base timeout for blob operations
    blobPerGBSeconds: 120 # Additional seconds per GB (e.g., 2GB blob = 60 + 240 = 300s)
    manifestSeconds: 30 # Timeout for manifest operations
    maxTimeoutMinutes: 30 # Maximum timeout cap (30 min)
  registries:
  - name: "docker.io"
    url: "https://registry-1.docker.io"
    default: true
  - name: "ghcr.io"
    url: "https://ghcr.io"
  - name: "gcr.io"
    url: "https://gcr.io"
  - name: "quay.io"
    url: "https://quay.io"

# S3-compatible object storage (Garage, MinIO, AWS S3)
# When enabled, blobs/manifests/charts are stored in S3 instead of local disk.
# This allows running multiple replicas without a shared filesystem (no RWX PVC).
s3:
  enabled: false
  endpoint: "http://garage.garage.svc:3900" # Garage/MinIO endpoint
  region: "garage" # "garage" for Garage, "us-east-1" for AWS
  bucket: "oci-storage"
  pathStyle: true # true for Garage/MinIO, false for AWS
  # accessKey/secretKey: use S3_ACCESS_KEY / S3_SECRET_KEY env vars

  # Redis for shared state across replicas (upload sessions, distributed locks)
  # Required when running multiple replicas. Optional for single replica.
redis:
  enabled: false
  addr: "redis.redis.svc:6379"
  # password: use REDIS_PASSWORD env var
  db: 0

# Trivy vulnerability scanner configuration
trivy:
  enabled: true
  serverURL: "http://localhost:4954"
  policy:
    blockOnPull: true
    mode: "warn" # warn = allow with header, block = 403 if pending/denied
    maxCritical: 0 # 0 = no critical CVEs tolerated
    maxHigh: 0 # 0 = disabled (no limit on HIGH)
    maxTotal: 0 # 0 = disabled (no limit on total)
    allowlist: [] # CVE IDs to ignore (e.g., CVE-2023-12345)
    exemptImages: [] # Image prefixes never blocked (e.g., proxy/docker.io/library/alpine)
    ttlHours: 24 # Re-scan after this many hours
