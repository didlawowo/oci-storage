version: '3'

tasks:
  default:
    cmds:
    - task --list

  run-dev:
    desc: Start dev server with hot reload
    dir: src
    cmds:
    - air

  build:
    desc: Build and push Docker image
    vars:
      COMMIT_SHA:
        sh: git rev-parse --short HEAD
    cmds:
    - docker buildx build --platform linux/amd64 -t fizzbuzz2/oci-storage:{{.COMMIT_SHA}} --push .
    - 'sed -i "" "s/tag: .*/tag: \"{{.COMMIT_SHA}}\"/" helm/values.yaml'
    - echo "Pushed fizzbuzz2/oci-storage:{{.COMMIT_SHA}} and updated helm/values.yaml"

  start:
    desc: Start Docker container
    cmds:
    - docker compose up -d

  stop:
    desc: Stop Docker container
    cmds:
    - docker compose down

  helm-template:
    desc: Template the helmchart
    dir: helm
    cmds:
    - helm template . --debug -f values/home/values.yaml > rendered.yaml

  helm-deploy:
    desc: 'Deploy oci-storage via Helm (infra-tier service, bypasses ArgoCD). NS=oci-storage REL=oci-storage. Uses helm/values.yaml only.'
    vars:
      NS: '{{.NS | default "oci-storage"}}'
      REL: '{{.REL | default "oci-storage"}}'
    cmds:
      - echo "Deploying {{.REL}} into namespace {{.NS}} from ./helm"
      - helm upgrade --install {{.REL}} ./helm
          --namespace {{.NS}}
          --create-namespace
          --history-max 5
          --wait
          --timeout 5m
      - echo "✓ Deployed. Watch with{{":"}} kubectl get pods -n {{.NS}} -w"

  helm-uninstall:
    desc: Uninstall oci-storage release (keeps namespace + NFS PV with retain policy)
    vars:
      NS: '{{.NS | default "oci-storage"}}'
      REL: '{{.REL | default "oci-storage"}}'
    cmds:
      - helm uninstall {{.REL}} --namespace {{.NS}}
      - echo "✓ Release uninstalled. NFS PV (Retain) and data on NAS remain intact."

  test-unit:
    desc: Run Go unit tests
    dir: src
    cmds:
    - go test ./pkg/... -v

  test-e2e:
    desc: Run full E2E tests (OCI protocol, HTTP API, proxy, auth, backup)
    dir: tests
    cmds:
    - ./test-e2e.sh

  create-auth-secret:
    desc: Create Kubernetes auth secret
    cmds:
    - kubectl create secret generic oci-storage-auth --from-literal=HELM_USERS="admin:secret123,dev:devpass,readonly:readpass" --namespace=kube-infra --dry-run=client -o yaml | kubectl apply -f -

  create-backup-secret:
    desc: Create Kubernetes backup secret (AWS)
    cmds:
    - kubectl create secret generic oci-storage-backup --from-literal=BACKUP_ENABLED="true" --from-literal=BACKUP_PROVIDER="aws" --from-literal=AWS_BUCKET="oci-storage-backup" --from-literal=AWS_REGION="eu-west-1" --from-literal=AWS_ACCESS_KEY_ID="YOUR_ACCESS_KEY" --from-literal=AWS_SECRET_ACCESS_KEY="YOUR_SECRET_KEY" --namespace=kube-infra --dry-run=client -o yaml | kubectl apply -f -

  publish:
    desc: 'Build, tag, push image and update helm chart. Usage: task publish (patch) | BUMP=minor task publish | BUMP=major task publish'
    vars:
      BUMP: '{{.BUMP | default "patch"}}'
      LATEST_TAG:
        sh: git tag --sort=-v:refname | head -1 | sed 's/^v//'
      NEW_VERSION:
        sh: |
          latest=$(git tag --sort=-v:refname | head -1 | sed 's/^v//')
          major=$(echo $latest | cut -d. -f1)
          minor=$(echo $latest | cut -d. -f2)
          patch=$(echo $latest | cut -d. -f3)
          case "${BUMP:-patch}" in
            major) echo "$((major+1)).0.0" ;;
            minor) echo "${major}.$((minor+1)).0" ;;
            patch|*) echo "${major}.${minor}.$((patch+1))" ;;
          esac
      COMMIT_SHA:
        sh: git rev-parse --short HEAD
    cmds:
      - echo "Current version {{.LATEST_TAG}} → New version {{.NEW_VERSION}}"
      # BuildKit cache: re-use layers from registry across builds (cache-to/cache-from).
      # Cross-compile via Go toolchain (no QEMU) thanks to TARGETOS/TARGETARCH ARGs in Dockerfile.
      - docker buildx build --platform linux/amd64
          --build-arg VERSION={{.NEW_VERSION}}
          --build-arg COMMIT={{.COMMIT_SHA}}
          --build-arg BUILD_TIME={{now | date "2006-01-02T15:04:05Z"}}
          --cache-from type=registry,ref=fizzbuzz2/oci-storage:buildcache
          --cache-to type=registry,ref=fizzbuzz2/oci-storage:buildcache,mode=max
          -t fizzbuzz2/oci-storage:v{{.NEW_VERSION}}
          --push .
      - 'sed -i "" "s/^version: .*/version: {{.NEW_VERSION}}/" helm/Chart.yaml'
      - 'sed -i "" "s/^appVersion: .*/appVersion: \"{{.NEW_VERSION}}\"/" helm/Chart.yaml'
      # Replace ONLY the app image tag (matches the line under image: with "v" prefix);
      # avoids clobbering other tag fields like redis.image.tag or trivy.image.tag.
      - 'sed -i "" "s/^  tag: \"v[0-9].*$/  tag: \"v{{.NEW_VERSION}}\"/" helm/values.yaml'
      - git add helm/Chart.yaml helm/values.yaml
      - git commit -m "chore{{":"}} release v{{.NEW_VERSION}}"
      - git tag v{{.NEW_VERSION}}
      - git push origin main --force --no-verify
      - git push origin v{{.NEW_VERSION}} --no-verify
      - echo "Published v{{.NEW_VERSION}} ✓"
