fullnameOverride: oci-storage
namespace: oci-storage
podAnnotations:
  oci-portal-skip: "true"
image:
  repository: fizzbuzz2/oci-storage
  tag: "062637e"
  pullPolicy: "Always"
  pullSecrets: []
strategy:
  type: Recreate # auto-switched to RollingUpdate when s3.enabled OR nfs.enabled OR replicas>1
replicas: 2 # >1 requires shared backend: s3.enabled=true OR nfs.enabled=true (RWX)
autoscaling:
  enabled: false # enable only when shared backend is in use
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80
# S3-compatible storage backend (Garage, MinIO, AWS S3)
# When enabled, replaces the local PVC for data storage, allowing multiple replicas.
s3:
  enabled: false
  endpoint: "http://garage.garage.svc:3900"
  region: "garage"
  bucket: "oci-storage"
  pathStyle: true # true for Garage/MinIO, false for AWS
  existingSecret: "" # secret with keys: S3_ACCESS_KEY, S3_SECRET_KEY
# Redis for shared state across replicas (distributed locks, upload tracking, scan dedup,
# single-flight on proxy blob downloads). Required when replicas > 1.
redis:
  enabled: true
  # When deploy=true the chart bundles a single-instance Redis StatefulSet and auto-wires
  # the app to it (REDIS_ADDR is overridden to "<release>-redis:6379"). Otherwise the chart
  # uses .addr/.existingSecret to point at an external Redis.
  deploy: true
  addr: "redis.redis.svc:6379" # ignored when deploy=true
  db: 0
  existingSecret: "" # secret with key: REDIS_PASSWORD (ignored when deploy=true + auth.password set)
  # Embedded Redis settings (only used when deploy=true)
  image:
    repository: redis
    tag: "7.4-alpine"
    pullPolicy: IfNotPresent
  maxmemory: "256mb"
  memoryLimit: "512Mi"
  auth:
    # Set to a non-empty string to enable AUTH on the embedded Redis. Leave empty for unauth
    # (acceptable since the Service is ClusterIP and Redis is only used for short-lived locks).
    password: ""
# NFS RWX backend — alternative to S3 for shared storage with multiple replicas.
# When enabled, the chart provisions a static PV + dedicated StorageClass that the PVC binds to.
# Bypass with createPV=false if you manage the PV externally (still set storageClassName below).
nfs:
  enabled: true
  createPV: true
  storageClassName: nfs-oci-storage
  server: "192.168.1.10"
  path: "/volume1/oci-storage"
  capacity: "200Gi"
  reclaimPolicy: Retain
  # Synology export uses anonuid=1024 (admin) via all_squash. Default mount opts (NFSv3) work.
  mountOptions: []
pdb:
  enabled: true
  maxUnavailable: 1
serviceAccount:
  create: true
  name: oci-storage
  annotations: {}
nodeSelector:
  kubernetes.io/arch: amd64 # image fizzbuzz2/oci-storage built amd64-only; exclude arm64 nodes
tolerations: []
# Anti-affinity: never schedule 2 replicas on the same node (avoids losing both pods if a node dies)
affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
    - labelSelector:
        matchExpressions:
        - key: app.kubernetes.io/component
          operator: In
          values: [ server ]
      topologyKey: kubernetes.io/hostname
initContainers:
- name: init-data-dir
  image: busybox
  # NFS RWX with all_squash maps writes to anonuid=1024, so chown is a no-op.
  # Just mkdir is enough; skip recursive chown to avoid traversing existing data on every boot.
  command:
  - sh
  - -c
  - |
    set -e
    mkdir -p /app/data/temp /app/data/blobs /app/data/manifests /app/data/charts /app/data/scan-results /app/data/scan-decisions
    echo "Directories ready"
  volumeMounts:
  - name: data-volume
    mountPath: /app/data
resources:
  limits:
    cpu: 2000m
    memory: 4Gi
  requests:
    cpu: 500m
    memory: 1Gi
# volumes
# NOTE: when nfs.enabled=true, accessModes is forced to RWX and storageClassName is overridden
# by the chart (see templates/pvc.yaml).
persistentVolumesClaims:
- name: oci-storage-data
  accessModes:
  - ReadWriteMany
  storageClassName: nfs-oci-storage
  size: 200Gi
application:
  ports:
  - name: http
    containerPort: 3030
    protocol: TCP
  containerName: oci-storage
  command: []
  args: []
service:
  name: oci-storage
  port: 80
  targetPort: 3030
  type: ClusterIP
  portName: http
  # ClientIP sticky for intra-cluster traffic (auto-enabled when replicas > 1).
  # For ingress traffic, Traefik cookie-based affinity is added separately.
  sessionAffinity: false
  sessionAffinityTimeoutSeconds: 10800 # 3h, covers long chunked uploads
secrets:
  dotenv: []
  #   - name: backup
  #     path: values/home/secrets/secrets.env
  files: []
  #   - name: auth
  #     path: values/home/secrets/auth.yaml
volumeMounts:
- name: config-volume
  mountPath: /app/config # Répertoire entier
  readOnly: true
- name: data-volume
  mountPath: /app/data
volumes:
- name: config-volume
  projected:
    sources:
    - configMap:
        name: oci-storage-config
        items:
        - key: config.yaml
          path: config.yaml
- name: data-volume
  persistentVolumeClaim:
    claimName: oci-storage-data
# probes — tolerant for IO-heavy workloads (large blob streams may delay /health response)
livenessProbe:
  httpGet:
    scheme: HTTP
    path: /health
    port: 3030
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 5
  successThreshold: 1
  failureThreshold: 6
readinessProbe:
  httpGet:
    scheme: HTTP
    path: /health
    port: 3030
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 3
  successThreshold: 1
  failureThreshold: 3
ingress:
  host: oci-storage.dc-tech.work
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-cloudflare
  tls:
    enabled: true
    secretName: ""
  ingressClassName: traefik
  # Traefik HA settings — auto-enabled when replicas > 1.
  # When active, the chart switches Ingress -> IngressRoute pointing at a TraefikService
  # that uses cookie-based sticky sessions + buffering middleware (10 GB body).
  traefik:
    sticky: false # forced true when replicas > 1
env:
- name: ENV
  value: production
# Configuration via variables d'environnement
- name: SERVER_PORT
  value: "3030"
- name: LOG_LEVEL
  value: "info"
# Proxy timeout overrides — generous caps for ML model layers (multi-GB)
- name: PROXY_TIMEOUT_MAX_MINUTES
  value: "90"
- name: PROXY_TIMEOUT_BLOB_PER_GB
  value: "60"
# Auth configuration - Option 1: Variable unique avec liste
# Temporaire pour test - à remplacer par secret en production
- name: HELM_USERS
  # Auth configuration - Choisir UNE des 3 options :

  value: "admin:secret123,dev:devpass,readonly:readpass"
# Registry credentials for proxy (loaded from secrets)
- name: GHCR_USERNAME
  # Backup configuration (si activé)
  # - name: BACKUP_ENABLED
  #   value: "true"
  # - name: BACKUP_PROVIDER
  #   value: "aws"  # ou "gcp" ou "azure"

  # Azure config
  # - name: AZURE_STORAGE_ACCOUNT
  #   value: "helmportalbackup"
  # - name: AZURE_CONTAINER
  #   value: "backup"
  # - name: AZURE_STORAGE_ACCOUNT_KEY
  #   value: "your-storage-key"

  # GCP config  
  # - name: GCP_BUCKET
  #   value: "oci-storage-backup"
  # - name: GCP_PROJECT_ID
  #   value: "your-project-id"
  # - name: GCP_CREDENTIALS_FILE
  #   value: "/path/to/credentials.json"

  # AWS config
  # - name: AWS_BUCKET
  #   value: "oci-storage-backup"
  # - name: AWS_REGION
  #   value: "eu-west-1"
  # - name: AWS_ACCESS_KEY_ID
  #   value: "your-access-key"
  # - name: AWS_SECRET_ACCESS_KEY
  #   value: "your-secret-key"
  valueFrom:
    secretKeyRef:
      name: ghcr-credentials
      key: username
      optional: true
- name: GHCR_PASSWORD
  valueFrom:
    secretKeyRef:
      name: ghcr-credentials
      key: password
      optional: true
- name: DOCKERHUB_USERNAME
  valueFrom:
    secretKeyRef:
      name: dockerhub-credentials
      key: username
      optional: true
- name: DOCKERHUB_PASSWORD
  valueFrom:
    secretKeyRef:
      name: dockerhub-credentials
      key: password
      optional: true
envFrom: []
# Secret pour les credentials d'authentification (activer après création du secret)
# - secretRef:
#     name: oci-storage-auth
# Secret pour les credentials de backup (optionnel)
# - secretRef:
#     name: oci-storage-backup
# External Secrets (Pulumi ESC)
externalSecrets:
  enabled: false
  secrets: []
# Kyverno policy for image rewriting
kyverno:
  enabled: true
  # The hostname of the OCI portal (without protocol)
  # e.g., "oci-storage.example.com" or "oci-storage:3030"
  portalHost: "oci-storage.dc-tech.work"
# Garbage collection CronJob configuration
gc:
  enabled: true
  # Cron schedule (default: daily at 3am)
  schedule: "0 3 * * *"
  # Run in dry-run mode (only report, don't delete)
  dryRun: false
  # Job history limits
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  # Authentication for GC endpoint (if required)
  auth:
    enabled: false
    username: ""
    password: ""
# Trivy vulnerability scanner sidecar
trivy:
  enabled: true
  image:
    repository: aquasec/trivy
    tag: "0.70.0"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  # Persistent volume for Trivy DB cache (avoids re-downloading on restart)
  dbVolume:
    enabled: true
    size: 1Gi
    storageClassName: longhorn
config:
  server:
    port: 3030
  storage:
    path: "data"
  backup:
    enabled: false
    provider: "" # "aws" ou "gcp"
    # gcp:
    #   bucket: "oci-storage-backup"
    #   projectID: "dc-consulting-home"
    # aws:
    #   bucket: "oci-storage-backup"
    #   region: "eu-west-1"
  logging:
    level: "info"
    format: "text"
  # Docker registry proxy/cache configuration
  proxy:
    enabled: true
    cache:
      maxSizeGB: 100
    registries:
    - name: "docker.io"
      url: "https://registry-1.docker.io"
      default: true
    - name: "registry-1.docker.io"
      url: "https://registry-1.docker.io"
    - name: "ghcr.io"
      url: "https://ghcr.io"
      # Credentials loaded from environment variables GHCR_USERNAME and GHCR_PASSWORD
    - name: "gcr.io"
      url: "https://gcr.io"
    - name: "eu.gcr.io"
      url: "https://eu.gcr.io"
    - name: "us.gcr.io"
      url: "https://us.gcr.io"
    - name: "asia.gcr.io"
      url: "https://asia.gcr.io"
    - name: "quay.io"
      url: "https://quay.io"
    - name: "registry.k8s.io"
      url: "https://registry.k8s.io"
    - name: "nvcr.io"
      url: "https://nvcr.io"
    - name: "code.forgejo.org"
      url: "https://code.forgejo.org"
  # Trivy vulnerability scanner
  trivy:
    enabled: true
    serverURL: "http://localhost:4954"
    policy:
      blockOnPull: true
      mode: "warn"
      maxCritical: 0
      maxHigh: 5
      maxTotal: 50
      allowlist: []
      exemptImages: []
      ttlHours: 24
