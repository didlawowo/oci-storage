{{- /*
  Trivy DB cache PVC. RWO Longhorn = un seul mounter, donc on skip le PVC
  quand replicas > 1 (le Deployment fallback sur emptyDir par-pod).
*/}}
{{- if and .Values.trivy.enabled .Values.trivy.dbVolume.enabled (le (int .Values.replicas) 1) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: oci-storage-trivy-db
  namespace: {{ .Release.Namespace }}
  labels: {{- include "application.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.trivy.dbVolume.storageClassName }}
  resources:
    requests:
      storage: {{ .Values.trivy.dbVolume.size }}
{{- end }}
