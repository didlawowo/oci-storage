---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oci-storage
  labels: {{- include "application.labels" . | nindent 4 }}
  namespace: {{ .Release.Namespace }}
spec:
  {{- if not .Values.autoscaling.enabled  }}
  replicas: {{ .Values.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "application.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: server
  {{- if or .Values.s3.enabled .Values.nfs.enabled (gt (int .Values.replicas) 1) }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  {{- else }}
  strategy: {{ toYaml .Values.strategy | nindent 4 }}
  {{- end }}
  template:
    metadata:
      labels:
        {{- include "application.labels" . | nindent 8 }}
        app.kubernetes.io/component: server
      annotations:
        # Trigger pod restart when configmap or secrets change
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secrets.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{  .Values.serviceAccount.name }}
      {{- if not .Values.s3.enabled }}
      # initContainer prepares the data dir tree on local PVC or NFS RWX
      initContainers: {{- toYaml .Values.initContainers | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ default .Values.application.containerName }}
          image: {{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.application.ports }}
          ports: {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.application.command }}
          command: {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.application.args }}
          args: {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources: {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
          {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.s3.enabled }}
            - name: S3_ENABLED
              value: "true"
            - name: S3_ENDPOINT
              value: {{ .Values.s3.endpoint | quote }}
            - name: S3_REGION
              value: {{ .Values.s3.region | quote }}
            - name: S3_BUCKET
              value: {{ .Values.s3.bucket | quote }}
            - name: S3_PATH_STYLE
              value: {{ .Values.s3.pathStyle | quote }}
            {{- if .Values.s3.existingSecret }}
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.s3.existingSecret }}
                  key: S3_ACCESS_KEY
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.s3.existingSecret }}
                  key: S3_SECRET_KEY
            {{- end }}
          {{- end }}
          {{- if .Values.redis.enabled }}
            - name: REDIS_ENABLED
              value: "true"
            - name: REDIS_ADDR
              {{- if .Values.redis.deploy }}
              # FQDN complet pour éviter les soucis de résolution short-name (ndots/search domains)
              value: "{{ .Release.Name }}-redis.{{ .Release.Namespace }}.svc.cluster.local:6379"
              {{- else }}
              value: {{ .Values.redis.addr | quote }}
              {{- end }}
            - name: REDIS_DB
              value: {{ .Values.redis.db | quote }}
            {{- if and .Values.redis.deploy .Values.redis.auth .Values.redis.auth.password }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: "{{ .Release.Name }}-redis-auth"
                  key: REDIS_PASSWORD
            {{- else if .Values.redis.existingSecret }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redis.existingSecret }}
                  key: REDIS_PASSWORD
            {{- end }}
          {{- end }}
          {{- with .Values.envFrom }}
          envFrom: {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
          {{- if .Values.s3.enabled }}
            - name: config-volume
              mountPath: /app/config
              readOnly: true
          {{- else }}
            {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            httpGet:
              path: {{ .httpGet.path }}
              port: {{ .httpGet.port }}
              scheme: {{ .httpGet.scheme }}
            initialDelaySeconds: {{ .initialDelaySeconds }}
            periodSeconds: {{ .periodSeconds }}
            timeoutSeconds: {{ .timeoutSeconds }}
            successThreshold: {{ .successThreshold }}
            failureThreshold: {{ .failureThreshold }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            httpGet:
              path: {{ .httpGet.path }}
              port: {{ .httpGet.port }}
              scheme: {{ .httpGet.scheme }}
            initialDelaySeconds: {{ .initialDelaySeconds }}
            periodSeconds: {{ .periodSeconds }}
            timeoutSeconds: {{ .timeoutSeconds }}
            successThreshold: {{ .successThreshold }}
            failureThreshold: {{ .failureThreshold }}
          {{- end }}
        {{- if .Values.trivy.enabled }}
        - name: trivy
          image: {{ .Values.trivy.image.repository }}:{{ .Values.trivy.image.tag }}
          imagePullPolicy: {{ .Values.trivy.image.pullPolicy }}
          command:
            - trivy
            - server
            - --listen
            - "0.0.0.0:4954"
          ports:
            - name: trivy
              containerPort: 4954
              protocol: TCP
          {{- with .Values.trivy.resources }}
          resources: {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            {{- if not .Values.s3.enabled }}
            - name: data-volume
              mountPath: /app/data
              readOnly: true
            {{- end }}
            {{- if .Values.trivy.dbVolume.enabled }}
            - name: trivy-db
              mountPath: /root/.cache
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 4954
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 4954
            initialDelaySeconds: 15
            periodSeconds: 10
        {{- end }}
      volumes:
        - name: config-volume
          projected:
            sources:
              - configMap:
                  name: oci-storage-config
                  items:
                    - key: config.yaml
                      path: config.yaml
      {{- if not .Values.s3.enabled }}
        - name: data-volume
          persistentVolumeClaim:
            claimName: oci-storage-data
      {{- end }}
      {{- if .Values.trivy.enabled }}
        {{- if and .Values.trivy.dbVolume.enabled (le (int .Values.replicas) 1) }}
        - name: trivy-db
          persistentVolumeClaim:
            claimName: oci-storage-trivy-db
        {{- else }}
        # Cache Trivy en emptyDir : RWO PVC ne peut pas être partagé entre replicas.
        # La DB Trivy (~600MB) se re-télécharge au démarrage.
        - name: trivy-db
          emptyDir:
            sizeLimit: 2Gi
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
