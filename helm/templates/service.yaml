
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.service.name }}
  labels: {{- include "application.labels" . | nindent 4 }}
  namespace: {{ .Release.Namespace }}
spec:
  # IMPORTANT: include component=server pour exclure le pod Redis qui partage les mêmes
  # selectorLabels (instance+name). Sans ce filtre, le Service round-robin envoie 1/3 du
  # trafic vers Redis sur :3030 → 502.
  selector:
    {{- include "application.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: server
  ports:
  - name: {{ .Values.service.portName }}
    targetPort: {{ .Values.service.targetPort }}
    port: {{ .Values.service.port }}
    protocol: TCP
  type: {{ .Values.service.type }}
  {{- /*
    Sticky session by client IP — required for chunked OCI uploads (POST→PATCH→PUT)
    when running multiple replicas. The UploadTracker rejects PATCH requests routed
    to the wrong pod; without affinity ~50% of multi-chunk pushes return 409.
    Auto-enabled when replicas > 1 OR explicitly via service.sessionAffinity.
  */}}
  {{- if or (gt (int .Values.replicas) 1) .Values.service.sessionAffinity }}
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: {{ .Values.service.sessionAffinityTimeoutSeconds | default 10800 }}
  {{- end }}
