{{- /*
  Two ingress modes:
  1. Standard Ingress (single replica or replicas==1): plain Service backend.
  2. Traefik IngressRoute (replicas > 1 + traefik): routes through TraefikService
     with cookie sticky + buffering middleware. Required because the K8s standard
     Ingress object cannot reference a Traefik TraefikService directly.
*/}}
{{- $useTraefikRoute := and (eq .Values.ingress.ingressClassName "traefik") (gt (int .Values.replicas) 1) -}}
{{- if $useTraefikRoute }}
# DNS-only Ingress so external-dns publishes the record (it doesn't read IngressRoute).
# Routing is handled by the IngressRoute below.
# Name = release name (NOT "-dns" suffix) to keep external-dns TXT ownership record stable.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name | quote }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    app: {{ .Release.Name | quote }}
  annotations:
    external-dns.alpha.kubernetes.io/hostname: {{ .Values.ingress.host | quote }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.ingressClassName }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.service.name }}
                port:
                  number: {{ .Values.service.port }}
{{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName | default (printf "%s-certificate-tls" .Release.Name) }}
{{- end }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ printf "%s-route" .Release.Name | quote }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    app: {{ .Release.Name | quote }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  entryPoints:
    {{- if .Values.ingress.tls.enabled }}
    - websecure
    {{- else }}
    - web
    {{- end }}
  routes:
    - match: Host(`{{ .Values.ingress.host }}`)
      kind: Rule
      middlewares:
        - name: {{ .Release.Name }}-buffering
          namespace: {{ .Release.Namespace }}
      services:
        # Direct Service reference: stickiness is provided by sessionAffinity:ClientIP
        # on the K8s Service (works with `docker push`, unlike cookie sticky).
        # serversTransport: per-route forwardingTimeouts for multi-GB ML pushes
        # (overrides backend-side response-header timeout — see middleware-traefik.yaml).
        - name: {{ .Values.service.name }}
          port: {{ .Values.service.port }}
          kind: Service
          passHostHeader: true
          serversTransport: {{ .Release.Name }}-transport
{{- if .Values.ingress.tls.enabled }}
  tls:
    secretName: {{ .Values.ingress.tls.secretName | default (printf "%s-certificate-tls" .Release.Name) }}
{{- end }}
{{- else }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $.Release.Name | quote }}
  namespace: {{ $.Release.Namespace | quote }}
  labels:
    app: {{ $.Release.Name | quote }}
  annotations:
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ $.Values.ingress.ingressClassName }}
  rules:
  - host: {{ $.Values.ingress.host }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
            service:
              name:  {{ $.Values.service.name }}
              port:
                number: {{ $.Values.service.port }}
{{- if .Values.ingress.tls.enabled }}
  tls:
  - hosts:
    - {{ $.Values.ingress.host }}
    secretName: {{ $.Values.ingress.tls.secretName | default (printf "%s-certificate-tls" $.Release.Name) }}
{{- end }}
{{- end }}
