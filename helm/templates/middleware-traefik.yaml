{{- /*
  Traefik middlewares + ServersTransport for HA mode:
  - buffering         : allow up to 10 GB request body (large blob pushes)
  - serversTransport  : per-route forwarding timeouts (overrides backend-side limits
                        without touching the cluster-wide entrypoint config). Required
                        for multi-GB ML image pushes where the backend takes minutes
                        to finalize the blob (sha256 verify + fsync on NFS) before
                        responding 201 — otherwise Traefik returns 504 Gateway Timeout.

  Stickiness for chunked OCI uploads is handled at the K8s Service level via
  sessionAffinity: ClientIP (see service.yaml). Cookie-based stickiness does not
  work with `docker push` because the Docker CLI does not store cookies between
  requests. ClientIP affinity pins each Traefik pod's connections to the same
  backend replica, which is sufficient for upload session continuity.

  Created when replicas > 1 OR ingress.traefik.sticky=true.
  Skipped if ingressClassName is not "traefik".
*/}}
{{- if and (eq .Values.ingress.ingressClassName "traefik") (or (gt (int .Values.replicas) 1) (and .Values.ingress.traefik .Values.ingress.traefik.sticky)) }}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ .Release.Name }}-buffering
  namespace: {{ .Release.Namespace }}
  labels: {{- include "application.labels" . | nindent 4 }}
spec:
  buffering:
    # 10 GB max request body for large image layer pushes (matches Fiber BodyLimit).
    maxRequestBodyBytes: 10737418240
    # Stream beyond 10 MB instead of buffering in memory.
    memRequestBodyBytes: 10485760
    # Same for responses (large blob pulls).
    maxResponseBodyBytes: 10737418240
    memResponseBodyBytes: 10485760
---
apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: {{ .Release.Name }}-transport
  namespace: {{ .Release.Namespace }}
  labels: {{- include "application.labels" . | nindent 4 }}
spec:
  forwardingTimeouts:
    # Time to establish TCP connection to backend pod.
    dialTimeout: 30s
    # Max time to wait for response headers from backend. Default is 0 (no limit) but
    # some Traefik installs enforce 60s — explicit 30m matches Fiber ReadTimeout/WriteTimeout
    # in src/cmd/server/main.go and covers fsync of multi-GB blobs on NFS.
    responseHeaderTimeout: 30m
    # Keep idle backend conns alive long enough to reuse across chunked PATCH/PUT.
    idleConnTimeout: 5m
{{- end }}
